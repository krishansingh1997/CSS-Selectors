<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
           1. Element Selector Syntex

            element{
                Property:value;
            }
        */

        div {
            width: 200px;
            height: 200px;
            background: red;
        }

        /*
            2. Id Selector Syntex       
                element#id{
                    Property:value;
                }
        */
        span#a1 {
            display: block;
            width: 200px;
            height: 200px;
            background: green;
        }

        /*
            3. Class Selector Syntex       
                element.class{
                    Property:value;
                }
        */
        span.b1 {
            display: block;
            width: 200px;
            height: 200px;
            background: purple;
        }

        /*
            4. Attribute Selector Syntex       
                element[name-value]{
                    Property:value;
                }
        */
        a[href="https://oklabs.in"] {
            display: block;
            width: 200px;
            height: 200px;
            background: lavender;
        }

        /*
            5. Universal Selector Syntex       
                *{
                    Property:value;
                }
        */
        * {
            border: 10px solid #000;
        }

        /*
            6. Group/Combinational Selector Syntex       
                element1,element2,element3.......{
                    Property:value;
                }
        */
        div,
        span#a1,
        span.b1,
        a[href="https://oklabs.in"] {
            display: inline-block;
        }

        /*
            7. CSS Pesudo Element Selector        
                element::selector{
                    Property:value;
                }
        */
        h1::after {
            content: url(https://www.goodlightscraps.com/content/smiley-gif/smiley-7.gif);
        }

        /*
            8. CSS Class Selector        
                element:selector{
                    Property:value;
                }
        */
        div#c1:hover {
            background: green;
        }
    </style>

</head>

<body>
    <div>CSS Element Selectors</div>
    <span id="a1">CSS Id Selector</span>
    <span class="b1">CSS Class Selector</span>
    <a href="https://oklabs.in">Go to Google Website</a>
    <h1>CSS Pesudo Element Selector ::</h1>
    <div id="c1">CSS Pesudo Class Selector :</div>
</body>

</html>
