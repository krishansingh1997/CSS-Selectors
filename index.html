<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
           1. Element Selector Syntex

            element{
                Property:value;
            }
        */

        div {
            width: 200px;
            height: 200px;
            background: red;
        }

        /*
            2. Id Selector Syntex       
                element#id{
                    Property:value;
                }
        */
        span#a1 {
            display: block;
            width: 200px;
            height: 200px;
            background: green;
        }

        /*
            3. Class Selector Syntex       
                element.class{
                    Property:value;
                }
        */
        span.b1 {
            display: block;
            width: 200px;
            height: 200px;
            background: purple;
        }
    </style>

</head>

<body>
    <div>CSS Element Selectors</div>
    <span id="a1">CSS Id Selector</span>
    <span class="b1">CSS Class Selector</span>
</body>

</html>
